[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/backend-api/*"
  to = "http://affilliance.runasp.net/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "http://affilliance.runasp.net/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "http://affilliance.runasp.net/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/chatbot-proxy/*"
  to = "https://mo7amedddd-api-chatbot.hf.space/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
# Trigger rebuild for environment variables